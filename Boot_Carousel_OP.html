<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <title>Document</title>
        <style>
            .carousel-item img {
                height: 65vh;
                object-fit: contain;
                background-color: black;
            }
            .carousel-indicators button{
                width: 12px;
                height: 12px;
                border-radius: 50%;
                background-color: rgba(255, 255, 255, 0.5);
                transition: all 0.3s ease;
            }

            .carousel-indicators .active {
                background-color: white;
                transform: scale(1.3);
            }
        </style>
    </head>

    <body>
        <div id="demo" class="carousel slide carousel-fade" data-bs-ride="carousel">
            <!--Indicators-->
            <div class="carousel-indicators">
                <button type="button" data-bs-target="#demo" data-bs-slide-to="0" class="active"></button>
                <button type="button" data-bs-target="#demo" data-bs-slide-to="1"></button>
                <button type="button" data-bs-target="#demo" data-bs-slide-to="2"></button>
                <button type="button" data-bs-target="#demo" data-bs-slide-to="3"></button>
            </div>
            <!--Slides-->
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="./img/OnePiece.jpg" class="d-block w-100">
                    <div class="carousel-caption d-none d-md-block" style="color: black;">
                        <h5>StrawHat Pirates</h5>
                        <p>Crew of the KING</p>
                    </div>
                </div>
                <div class="carousel-item">
                    <img src="./img/OnePiece2.webp" class="d-block w-100">
                </div>
                <div class="carousel-item">
                    <img src="./img/Shanks.jpg" class="d-block w-100">
                </div>
                <div class="carousel-item">
                    <img src="./img/Luffy2.jpg" class="d-block w-100">
                </div>
            </div>
            <!--Controls-->
            <button class="carousel-control-prev" type="button" data-bs-target="#demo" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#demo" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>
        </div>
    </body>
</html>
