<html lang="en">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <title>Document</title>

    <body>
        <div class="carousel slide" data-bs-ride="carousel" id="demo">
            <div class="carousel-indicators">
                <button class="active bg-danger" data-bs-target="#demo" data-bs-slide-to="0"></button>
                <button data-bs-target="#demo" data-bs-slide-to="1"></button>
                <button data-bs-target="#demo" data-bs-slide-to="2"></button>
                <button data-bs-target="#demo" data-bs-slide-to="3"></button>
            </div>
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="./Img/San Andreas.webp" class="d-block" style="width: 100%;">
                </div>
                <div class="carousel-item">
                    <img src="./Img/gta-san-andreas-orange-car.jpg" class="d-block" style="width: 100%;">
                </div>
                <div class="carousel-item">
                    <img src="./Img/Grove Street.webp" class="d-block" style="width: 100%;">
                </div>
                <div class="carousel-item">
                    <img src="./Img/SA Map.webp" class="d-block" style="width: 100%;">
                </div>
            </div>
            <button class="carousel-control-prev" data-bs-target="#demo" data-bs-slide="prev"><span class="carousel-control-prev-icon"></span></button>
            <button class="carousel-control-next" data-bs-target="#demo" data-bs-slide="next"><span class="carousel-control-next-icon"></span></button>
        </div>
    </body>
</html>
